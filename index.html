<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d0f12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WarDice — Battle Dice Roller</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=12">
</head>
<body>
  <header class="topbar">
    <button class="gear-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <h1>WAR<span>DICE</span></h1>
    <div class="spacer"></div>
    <div class="status-slot" id="statusSlot"></div>
  </header>

  <div id="board" class="board players-1"></div>

  <template id="playerTpl">
    <section class="player">
      <div class="pbody">
        <main class="results"></main>
        <div class="pside">
          <section class="sidepool" hidden>
            <div class="sidepool-head">
              <span>SIDE POOL <b class="pool-count">0</b></span>
              <div class="sidepool-actions">
                <button class="mini-btn pool-return">RETURN ALL</button>
                <button class="mini-btn danger pool-clear">CLEAR</button>
              </div>
            </div>
            <div class="dice-strip pool-dice"></div>
          </section>
          <div class="select-bar" hidden>
            <span class="select-count">0 SELECTED</span>
            <button class="mini-btn sel-reroll">REROLL</button>
            <button class="mini-btn sel-pool">POOL</button>
            <button class="mini-btn danger sel-delete">DELETE</button>
            <button class="mini-btn ghost sel-cancel">✕</button>
          </div>
          <footer class="cup">
            <div class="cup-status">
              <span class="pname"></span>
              <span class="ptotal"></span>
              <button class="mini-btn undo" disabled>↶ UNDO</button>
            </div>
            <div class="cup-row">
              <button class="cup-btn" data-add="-10">−10</button>
              <button class="cup-btn" data-add="-1">−1</button>
              <div class="cup-count">0</div>
              <button class="cup-btn" data-add="1">+1</button>
              <button class="cup-btn" data-add="10">+10</button>
              <button class="cup-btn" data-add="50">+50</button>
            </div>
            <div class="cup-row main-actions">
              <button class="ghost-btn cup-clear">CLEAR</button>
              <button class="roll-btn" disabled>ROLL</button>
              <button class="ghost-btn roll-again" disabled>AGAIN<small></small></button>
            </div>
          </footer>
        </div>
      </div>
    </section>
  </template>

  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="modal">
      <h2>SETTINGS</h2>
      <div class="setting">
        <label>ORIENTATION</label>
        <div class="seg" data-setting="orientation">
          <button data-val="portrait">PORTRAIT</button>
          <button data-val="landscape">LANDSCAPE</button>
          <button data-val="auto">AUTO</button>
        </div>
      </div>
      <div class="setting">
        <label>COLOR SCHEME — 40K FACTIONS</label>
        <select id="themeSelect" class="theme-select"></select>
      </div>
      <div class="setting">
        <label>SOUND</label>
        <div class="seg" data-setting="sound">
          <button data-val="on">ON</button>
          <button data-val="off">OFF</button>
        </div>
      </div>
      <div class="setting">
        <label>TABLET MODE — SPLIT BOARD</label>
        <div class="seg" data-setting="tablet">
          <button data-val="off">OFF</button>
          <button data-val="on">ON</button>
        </div>
      </div>
      <div class="setting" id="playersSetting" hidden>
        <label>PLAYERS</label>
        <div class="seg" data-setting="players">
          <button data-val="2">2</button>
          <button data-val="3">3</button>
          <button data-val="4">4</button>
        </div>
      </div>
      <p class="hint">Orientation lock applies in the installed app. Tablet mode splits the screen into 2–4 boards — players across the table get a flipped board facing them.</p>
      <button class="modal-done" id="settingsClose">DONE</button>
    </div>
  </div>

  <script src="app.js?v=12"></script>
</body>
</html>
